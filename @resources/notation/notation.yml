# notation.yml — the econark notation registry (single source of truth).
#
# Consumed by gen/gen_latex.py, gen/gen_myst.py, gen/gen_markdown.py.
# Do NOT hand-edit the generated artifacts (econark-notation.sty,
# notation-math.yml, NOTATION.md); edit THIS file and regenerate.
# A notational ruling is a PR against this file (see README.md, RULING_TEMPLATE.md).
#
# Schema (per symbol; see README.md §schema):
#   <semantic-key>:                    # kebab-case; names the OBJECT, never the letter
#     gloss:   "<one line>"
#     define:  "<defining equation, unicode>"          # optional
#     latex:   {macro: '\Xyz', expansion: '<latex>'}   # optional (glosses may omit)
#     unicode: '<glyph(s)>'
#     python:  '<HARKishName>'                          # optional; PROPOSED if not in use
#     aliases: ["<sanctioned alternates + where>"]      # optional
#     dialects: {<key>: {expansion, home, note, status}}   # optional; DECLARED divergences
#     conflicts_checked: "<what was verified against what>"  # optional
#     ruling:  {date, source, rationale}

meta:
  version: 0.1.0        # SemVer: MAJOR = change to an existing rendering/meaning;
  updated: 2026-07-14   #         MINOR = additions; PATCH = gloss/typo fixes

symbols:

  human-wealth:
    gloss: "normalized human wealth, current period's income INCLUDED (BST eq-HDef)"
    define: "h_t = (1−ℛ^{−(T−t+1)})/(1−ℛ⁻¹);  limit h = 1/(1−ℛ⁻¹) = R/(R−Γ)"
    latex: {macro: '\hNrm', expansion: 'h'}
    unicode: 'h'
    python: 'hNrm'
    dialects:
      hark-python:
        expansion: 'h − 1'
        home: "HARK's hNrm EXCLUDES the current period"
        note: "verified in HARK source 2026-07-14"
        status: "MIGRATION-PENDING (ruling 4): a SEMANTIC divergence — needs an explicit owner ruling (rename / re-derive / waiver) before any HARK code change; do not touch code from this mission"
    ruling:
      date: 2026-07-14
      source: "BST feedback N1"
      rationale: "one h, BST's; the shadow h_BST and local future-only h are banned"

  wealth-total-pf:
    gloss: "perfect-foresight total wealth (human and market) — the optimist's wealth, viewed after returns realize on last period's kapital"
    define: "w̄ := b + h = m − 1 + h"
    latex: {macro: '\wbar', expansion: '\bar{w}'}
    unicode: 'w̄'
    python: 'wBarNrm'   # PROPOSED — no HARK use yet
    conflicts_checked: "w unused in BST (verified 2026-07-14); bar = optimist per BST's own overbar sentence (BufferStockTheory.md ~line 2882) + MoM convention"
    ruling: {date: 2026-07-14, source: "BST feedback R1"}

  bank-balances:
    gloss: "beginning-of-period nonhuman wealth: returns realized on last period's assets"
    define: "b = ℛa = m − 1 (nonstochastic ℛ; stochastic form b′ = (R/(Γψ′))a)"
    latex: {macro: '\bNrm', expansion: 'b'}
    unicode: 'b'
    python: 'bNrm'
    ruling: {date: 2026-07-14, source: "BST feedback N2 (BST's own b := m−1 overbrace, BufferStockTheory.md MPCminDefn block)"}

  precautionary-saving:
    gloss: "the shortfall of consumption below BST's perfect-foresight rule"
    define: "s(m) := c̄(m) − c(m) = κ̲·w̄ − c(m) = g(w̄)"
    latex: {macro: '\pcsNrm', expansion: 's'}   # macro name = owner bikeshed, see DRIFT/report
    unicode: 's'
    aliases: ["g — the sanctioned working symbol in the powerlaw proof corpus (s is a pervasive dummy there); the identity s(m) = g(w̄) is stated where defined"]
    ruling: {date: 2026-07-14, source: "BST feedback R0 + contract v3"}

  crra:
    gloss: "coefficient of relative risk aversion"
    latex: {macro: '\CRRA', expansion: '\rho'}
    unicode: 'ρ'
    python: 'CRRA'
    dialects:
      bst-paper:
        expansion: '\gamma'
        home: "BST published draft"
        status: "MIGRATION-PENDING (ruling 4: single dialect across the four; the draft's gamma -> rho migration is owner-gated, do not execute)"
        note: "until migrated, cross-citing docs must state the map (the powerlaw pages' §2 does)"
    ruling: {date: 2026-07-14, source: "powerlaw §2 symbol dictionary + ruling 4"}

  growth-factor:
    gloss: "permanent-income growth factor"
    latex: {macro: '\PermGroFac', expansion: '\Gamma'}
    unicode: 'Γ'
    python: 'PermGroFac'
    conflicts_checked: "econark-shortcuts.sty defines \\PermGroFac as \\mathcal{G} (the BST-paper 𝒢 dialect); DRIFT-AUDIT Category B. Registry base = \\Gamma (powerlaw/HARK dialect). Since econark-notation.sty uses \\providecommand, a doc that also loads econark-shortcuts.sty gets \\mathcal{G} (shortcuts wins); load econark-notation alone for the base dialect. Reconciliation is owner-gated (ruling 4)."
    dialects:
      bst-paper:
        expansion: '\mathcal{G}'
        home: "BST published draft (𝒢); also econark-shortcuts.sty's \\PermGroFac"
        status: "MIGRATION-PENDING (ruling 4; owner-gated)"
    ruling: {date: 2026-07-14, source: "powerlaw §2 symbol dictionary + ruling 4"}

  transitory-shock-all:
    gloss: "transitory shock INCLUDING the zero-income atom"
    latex: {macro: '\tranShkAll', expansion: '\xi'}
    unicode: 'ξ'
    dialects:
      powerlaw-pages:
        expansion: '\theta'
        home: "powerlaw corpus writes θ for the shock incl. atom cases"
        note: "BST reserves θ (\\tranShkEmp) for the employed-state shock; ξ = 0 w.p. ℘, else θ/(1−℘)"
        status: "MIGRATION-PENDING (ruling 4; intra-four divergence; direction needs an owner ruling — flag in report)"
    ruling: {date: 2026-07-14, source: "BST ass-shocks + powerlaw §2 + ruling 4"}

  permanent-shock:
    gloss: "permanent shock, E[ψ]=1, bounded support"
    latex: {macro: '\permShk', expansion: '\psi'}
    unicode: 'ψ'
    python: 'PermShk'

  zero-income-prob:
    gloss: "probability of the zero-income event (the worst transitory atom)"
    latex: {macro: '\pZero', expansion: '\wp'}
    unicode: '℘'
    python: 'pZero'
    ruling: {date: 2026-07-14, source: "T5: part of the maintained income-process assumption where load-bearing; results surviving ℘=0 say so explicitly"}

  mpc-min:
    gloss: "limiting MPC as m→∞ (PF MPC); pessimist/lower-bound underline"
    define: "κ̲ = 1 − Þ_R"
    latex: {macro: '\MPCmin', expansion: '\underline{\kappa}'}
    unicode: 'κ̲'
    python: 'MPCmin'
    aliases: ["\\kap — the powerlaw pages' macro for the same object (verified 2026-07-14, theory/powerlaw-decay/myst.yml)"]

  mpc-max:
    gloss: "limiting MPC as m→0 (worst-atom)"
    define: "κ̄ = 1 − ℘^{1/ρ}Þ_R"
    latex: {macro: '\MPCmax', expansion: '\overline{\kappa}'}
    unicode: 'κ̄'
    python: 'MPCmax'

  patience-abs:
    gloss: "absolute patience factor"
    define: "Þ = (Rβ)^{1/ρ}"
    latex: {macro: '\APFac', expansion: '\text{Þ}'}
    unicode: 'Þ'
    aliases: ["\\Thorn — the powerlaw pages' macro (\\text{Þ}); verified KaTeX-safe 2026-07-14"]

  patience-return:
    gloss: "return patience factor"
    define: "Þ_R = Þ/R"
    latex: {macro: '\RPFac', expansion: '\text{Þ}_{R}'}
    unicode: 'Þ_R'
    aliases: ["\\ThornR — powerlaw pages"]

  patience-growth:
    gloss: "growth patience factor"
    define: "Þ_Γ = Þ/Γ"
    latex: {macro: '\GPFacRaw', expansion: '\text{Þ}_{\Gamma}'}
    unicode: 'Þ_Γ'
    aliases: ["\\ThornG — powerlaw pages"]

  return-growth-ratio:
    gloss: "growth-normalized return"
    define: "ℛ = R/Γ"
    latex: {macro: '\RNrmByG', expansion: '\mathcal{R}'}
    unicode: 'ℛ'
    aliases: ["\\Rcal — powerlaw pages (\\mathcal{R})"]

  high-wealth-exponent:
    gloss: "high-wealth decay-exponent characteristic root (random-multiplicative eigenvalue); realized exponent min(1, q↑)"
    define: "root of E[ψ^{1+q}] = ℛ·Þ_Γ^q  (ψ≡1: q↑ = ln ℛ / ln(1/Þ_Γ))"
    latex: {macro: '\qHi', expansion: 'q{\uparrow}'}
    unicode: 'q↑'
    aliases: ["supersedes q* (\\qstar, q^{*}) — the powerlaw corpus' pre-2026-07-14 symbol"]
    ruling:
      date: 2026-07-14
      source: "owner ruling (supersedes q* = \\qstar): arrow decorations — q↑ (high-wealth) / q↓ (constraint)"
      rationale: "up/down arrows read directly as the two ends of the wealth domain"

  constraint-end-exponent:
    gloss: "constraint-end (bottom-knot) approach exponent — the down-arrow partner of q↑; PROVEN q↓ = ρ"
    define: "MPC deficit κ̄ − c/mᵉ ≍ (mᵉ)^ρ; in MoM coords χ(μ) = μ + b₀ + O(e^{ρμ})"
    latex: {macro: '\qLo', expansion: 'q{\downarrow}'}
    unicode: 'q↓'
    aliases: ["supersedes q° (\\qcirc, q_{\\circ}) — the 2026-07-13 constraint-end theorem symbol"]
    ruling:
      date: 2026-07-14
      source: "owner ruling (supersedes q° = \\qcirc, 2026-07-13 constraint-end theorem): arrow decorations"
      rationale: "PROVEN q↓ = ρ (CRRA); the letter r stays reserved for the interest rate"

  compensation-exponent:
    gloss: "trial/compensation exponent in the detection machinery"
    latex: {macro: '\qtilde', expansion: '\tilde{q}'}
    unicode: 'q̃'
    aliases: ["alt_proof_compactified.md retains s for this internally (declared bridge)"]
    ruling: {date: 2026-07-14, source: "feedback revision: frees the letter s for precautionary saving on reader-facing pages"}

  target:
    gloss: "individual buffer-stock target: E[m′/m] = 1 at m̂ (WRIC+FVAC+GIC-Mod)"
    latex: {macro: '\mTrgNrm', expansion: '\hat{m}'}
    unicode: 'm̂'
    python: 'mTrgNrm'

  pseudo-target:
    gloss: "balanced-growth pseudo-target (GIC-Raw)"
    latex: {macro: '\mBalLvl', expansion: '\check{m}'}
    unicode: 'm̌'
    python: 'mBalLvl'

  return-region:
    gloss: "the compact interval around the target that the renewal argument uses; exists because θ has bounded support; upper edge computable"
    define: "upper edge ζ = C₀/(1−Þ_Γ), C₀ = max(1, θ_max − 1 + ℛ·ḡ)"
    unicode: 'ζ (edge)'
    ruling: {date: 2026-07-14, source: "feedback T3/C3 (def-return-region anchor)"}

  # --- MoM set (source: MethodOfModeration content/macros.yml — promote as shared
  #     since the powerlaw pages now cite the bar-convention) ---

  human-wealth-optimist:
    gloss: "optimist's human wealth (bar = optimist)"
    latex: {macro: '\hNrmOpt', expansion: '\bar{h}'}
    unicode: 'h̄'

  human-wealth-pessimist:
    gloss: "pessimist's (minimal) human wealth"
    latex: {macro: '\hNrmPes', expansion: '\underline{h}'}
    unicode: 'h̲'

  resources-excess:
    gloss: "excess market resources above the natural borrowing constraint"
    define: "m̈ = m − m_min"
    latex: {macro: '\mNrmEx', expansion: '\ddot{m}'}
    unicode: 'm̈'
    aliases: ["the powerlaw constraint-end pages write m^e for the same object — candidate future unification, NOT ruled"]

  log-excess-resources:
    gloss: "log excess resources"
    define: "μ = ln m̈"
    latex: {macro: '\logmNrmEx', expansion: '\boldsymbol{\mu}'}
    unicode: 'μ'
