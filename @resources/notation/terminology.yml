# terminology.yml — banned / preferred / defined terms + prose conventions.
#
# Consumed by gen/gen_lint.py -> notation-lint.sh (word-boundary grep gates)
# and gen/gen_markdown.py (the human-readable NOTATION.md table).
# A terminology ruling is a PR against this file (see README.md).
#
# Schema:
#   banned:      [{term, use, scope?, ruling}]   # scope optional; default = all prose
#   defined:     [{term, definition, ruling}]
#   conventions: [{rule, ruling}]

banned:
  - term: "\\mathfrak{b} (Euler-weight shorthand)"
    use: "write RβΓ^{−ρ} out; after identity (I1), Þ_Γ^ρ"
    scope: "powerlaw corpus + buffer-stock expositions"
    ruling: {date: 2026-07-17, source: "owner: 'I prohibit you from using \\mathfrak{b}... if you can't find a better option you can just write out the whole expression'"}
  - term: "dual-guise (and 'guise' as a notational term of art)"
    use: "state the convention concretely: functions upright with argument (BST \\cFunc style); italic letters are quantities; single-role letters need no upright form"
    scope: "all corpus prose, comments, instruments, registry glosses"
    ruling: {date: 2026-07-17, source: "owner: 'I'm going to strictly prohibit you from using what you call a textbook dual-guise object'"}
  - term: "dividend"
    use: "the adjustment (the per-period provision moving the buffer stock toward its target)"
    scope: "powerlaw corpus + buffer-stock expositions"
    ruling: {date: 2026-07-16, source: "owner (reactions round 2): connotes a strictly positive flow; an oversized buffer stock adjusts DOWNWARD"}
  - term: "precautionary premium"
    use: "the (Kimball) adjustment"
    scope: "powerlaw corpus + buffer-stock expositions"
    ruling: {date: 2026-07-16, source: "owner (reactions round 2): same sign-connotation objection; credit Kimball, not Arrow–Pratt, for the precautionary object"}
  - term: "precautionary debt"
    use: "the buffer stock (the wealth cushion vs the target m̂); x = its financing"
    scope: "powerlaw corpus"
    ruling: {date: 2026-07-16, source: "owner (reactions round 2 + Q-A(ii))"}
  - term: 'production'
    use: 'estimated / estimation'
    scope: "software sense only, in the powerlaw/theory thread's exposition + codebase; economic production functions exempt; committed run logs change only via real re-runs"
    ruling: {date: 2026-07-14, source: 'R5'}
  - term: 'certainty equivalent'
    use: 'perfect foresight'
    ruling: {date: 2026-07-14, source: 'T1'}
  - term: 'target band'
    use: "'the target' / 'the return region around the target m̂'"
    ruling: {date: 2026-07-14, source: 'T3'}

defined:
  - term: 'GIC-cap'
    definition: "β capped a hair below the raw growth-impatience (GIC) boundary; Strong Growth Impatience (GIC-Mod) already fails there — no target exists; at the estimated ceiling calibration even the mean log-drift is positive"
    ruling: {date: 2026-07-14, source: 'T4 + verification blocker fix'}

conventions:
  - rule: "lemmas cited as L0, L1, …; primes mark strengthened variants"
    ruling: {date: 2026-07-14, source: 'C6'}
  - rule: "℘ > 0 is phrased as part of the maintained income-process assumption where load-bearing (WRIC's form, the natural borrowing constraint, κ̄); results that survive ℘ = 0 must say so explicitly"
    ruling: {date: 2026-07-14, source: 'T5'}
  - rule: "bar = optimist / upper bound; underline = pessimist / lower bound (BST's c̄, κ̲; MoM's h̄/h̲, c̄/c̲; w̄)"
    ruling: {date: 2026-07-14, source: 'N3'}
